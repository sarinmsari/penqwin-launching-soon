<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="upgrade-insecure-requests"
    />

    <title>Penqwin</title>
    <meta
      name="description"
      content="Penqwin is a plaform for serious engineering products. Launching soon."
    />
    <link rel="canonical" href="https://penqwin.com/" />

    <meta property="og:title" content="Penqwin | For serious products" />
    <meta
      property="og:description"
      content="Purpose-built for serious products. Launching soon."
    />
    <meta property="og:image" content="https://penqwin.com/assets/og_image.png" />
    <meta property="og:url" content="https://penqwin.com/" />
    <meta property="og:type" content="website" />

    <script>
      if (history.scrollRestoration) {
        history.scrollRestoration = "manual";
      }

      window.onbeforeunload = function () {
        window.scrollTo(0, 0);
      };
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <link rel="stylesheet" href="style.css" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Penqwin",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "description": "A purpose-built documentation environment optimized for serious, high-performance engineering product teams.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <script>
      // vercel analytics
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <script>
      // vercel speed insights
      window.si =
        window.si ||
        function () {
          (window.siq = window.siq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </head>
  <body>
    <div class="scroll-track">
      <div class="viewport">
        <div class="zoom-container" id="zoomContainer">
          <div class="layer"></div>
          <div class="layer mask" id="interactiveMask"></div>
        </div>

        <div class="ui-overlay" id="uiOverlay">
          <div class="status-badge" id="badge">Launching soon</div>
          <h1 id="title">Penqwin</h1>
          <div class="text-reveal-mask">
            <p id="subText">for serious products</p>
            <span class="cursor" id="typingCursor"></span>
          </div>
        </div>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
