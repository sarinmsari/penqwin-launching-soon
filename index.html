<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    
    <title>Penqwin</title>
    <meta
      name="description"
      content="Penqwin is a plaform for serious engineering products. Launching soon."
    />
    <link rel="canonical" href="https://penqwin.com/" />

    <meta property="og:title" content="Penqwin | For serious products" />
    <meta
      property="og:description"
      content="Purpose-built for serious products. Launching soon."
    />
    <meta property="og:image" content="https://penqwin/assets/og-image.jpg" />
    <meta property="og:url" content="https://penqwin.com/" />
    <meta property="og:type" content="website" />

    <script>
      if (history.scrollRestoration) {
        history.scrollRestoration = "manual";
      }

      window.onbeforeunload = function () {
        window.scrollTo(0, 0);
      };
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <link rel="stylesheet" href="style.css" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Penqwin",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "description": "A purpose-built documentation environment optimized for serious, high-performance engineering product teams.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <script>
      // vercel analytics
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <script>
      // vercel speed insights
      window.si =
        window.si ||
        function () {
          (window.siq = window.siq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </head>
  <body>
    <div class="scroll-track">
      <div class="viewport">
        <div class="zoom-container" id="zoomContainer">
          <div class="layer"></div>
          <div class="layer mask" id="interactiveMask"></div>
        </div>

        <div class="ui-overlay" id="uiOverlay">
          <div class="status-badge" id="badge">Launching soon</div>
          <h1 id="title">Penqwin</h1>
          <div class="text-reveal-mask">
            <p id="subText">for serious products</p>
            <span class="cursor" id="typingCursor"></span>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.addEventListener("load", function () {
        ScrollTrigger.refresh();
      });
      gsap.registerPlugin(ScrollTrigger);

      const mask = document.getElementById("interactiveMask");
      const zoomContainer = document.getElementById("zoomContainer");
      const uiOverlay = document.getElementById("uiOverlay");

      window.addEventListener("mousemove", (e) => {
        const rect = zoomContainer.getBoundingClientRect();

        // Calculate mouse position relative to the Zoom Container
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        mask.style.setProperty("--mouse-x", x + "%");
        mask.style.setProperty("--mouse-y", y + "%");

        const xPct = (e.clientX / window.innerWidth - 0.5) * 2;
        const yPct = (e.clientY / window.innerHeight - 0.5) * 2;
        gsap.to(zoomContainer, {
          rotationY: xPct * 3,
          rotationX: -yPct * 3,
          duration: 1,
          ease: "power2.out",
        });
      });

      // Split text
      const subText = document.getElementById("subText");
      subText.innerHTML = subText.innerText
        .split(" ")
        .map((w) => `<span class="word">${w}</span>`)
        .join("");

      const tl = gsap.timeline({
        scrollTrigger: {
          trigger: ".scroll-track",
          start: "top top",
          end: "bottom bottom",
          scrub: 1.2,
          pin: true,
          pinSpacing: false,
        },
      });

      tl.to(
        "#title",
        {
          opacity: 1,
          y: 0,
          letterSpacing: "0.1em",
          duration: 0.8,
          ease: "power2.out",
        },
        0,
      );

      tl.fromTo(
        "#zoomContainer",
        { scale: 2.5 },
        { scale: 1, ease: "power1.inOut" },
        0,
      );
      tl.to("#badge", { opacity: 1, y: 0, duration: 0.4 }, 0.2);
      tl.to(
        ".word",
        {
          y: "0%",
          opacity: 1,
          stagger: 0.1,
          duration: 0.6,
          ease: "back.out(1.5)",
        },
        0.3,
      );

      tl.to(
        "#typingCursor",
        {
          y: "0%",
          opacity: 1,
          duration: 0.6,
          onComplete: () =>
            document.getElementById("typingCursor").classList.add("blinking"),
          onReverseComplete: () =>
            document
              .getElementById("typingCursor")
              .classList.remove("blinking"),
        },
        0.5,
      );
    </script>
  </body>
</html>
